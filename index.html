<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yupi - Знакомства</title>
    <style>
        :root {
            --main-color: #8e44ad;
            --secondary-color: #9b59b6;
            --bg-color: #f3f0f7;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { color: var(--main-color); margin-bottom: 20px; }

        .hidden { display: none !important; }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--main-color); }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--main-color);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { background-color: var(--secondary-color); }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .nav-buttons button { background-color: #555; }

        #avatar-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 3px solid var(--main-color);
        }

        /* Карточка для лайков */
        .card {
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }

        .action-btns {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }

        .btn-like { background-color: #2ecc71; width: 45%; }
        .btn-dislike { background-color: #e74c3c; width: 45%; }
        
        .profile-info { text-align: left; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Yupi</h1>

    <!-- 1. РЕГИСТРАЦИЯ -->
    <div id="auth-section">
        <h3>Регистрация</h3>
        <input type="text" id="reg-name" placeholder="Ваше имя">
        <input type="number" id="reg-age" placeholder="Возраст">
        <textarea id="reg-bio" placeholder="О себе"></textarea>
        <p>Фото профиля:</p>
        <input type="file" id="reg-photo" accept="image/*">
        <button onclick="register()">Войти в Yupi</button>
    </div>

    <!-- 2. МОЙ ПРОФИЛЬ -->
    <div id="profile-section" class="hidden">
        <h3>Мой профиль</h3>
        <img id="my-avatar-display" src="" alt="Аватар" style="width:100px; height:100px; border-radius:50%; object-fit:cover;">
        <input type="text" id="edit-name" placeholder="Имя">
        <input type="number" id="edit-age" placeholder="Возраст">
        <textarea id="edit-bio" placeholder="О себе"></textarea>
        <button onclick="updateProfile()">Сохранить изменения</button>
        
        <div class="nav-buttons">
            <button onclick="showSection('dating-section')">Искать людей</button>
        </div>
    </div>

    <!-- 3. ЛАЙКИ / ПОИСК -->
    <div id="dating-section" class="hidden">
        <h3>Знакомства</h3>
        <div id="user-card" class="card">
            <img id="card-photo" src="https://via.placeholder.com/150" style="width:100%; border-radius:10px;">
            <h4 id="card-name">Имя, Возраст</h4>
            <p id="card-bio">Описание здесь...</p>
            <div class="action-btns">
                <button class="btn-dislike" onclick="nextUser()">✖</button>
                <button class="btn-like" onclick="nextUser()">❤</button>
            </div>
        </div>
        
        <div class="nav-buttons">
            <button onclick="showSection('profile-section')">В профиль</button>
        </div>
    </div>
</div>

<script>
    // Хранилище данных текущего пользователя
    let currentUser = {
        name: '',
        age: '',
        bio: '',
        photo: 'https://via.placeholder.com/150'
    };

    // Фейковые пользователи для примера лайков
    const mockUsers = [
        {name: 'Анна', age: 22, bio: 'Люблю кофе и прогулки', photo: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200'},
        {name: 'Дмитрий', age: 27, bio: 'Путешествую на машине', photo: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200'},
        {name: 'Мария', age: 25, bio: 'Играю на гитаре', photo: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200'}
    ];
    let currentUserIndex = 0;

    function showSection(id) {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('profile-section').classList.add('hidden');
        document.getElementById('dating-section').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    // Регистрация
    function register() {
        const name = document.getElementById('reg-name').value;
        const age = document.getElementById('reg-age').value;
        const bio = document.getElementById('reg-bio').value;
        const photoInput = document.getElementById('reg-photo');

        if(!name || !age) {
            alert("Пожалуйста, заполните имя и возраст");
            return;
        }

        currentUser.name = name;
        currentUser.age = age;
        currentUser.bio = bio;

        if (photoInput.files && photoInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentUser.photo = e.target.result;
                syncProfileData();
            }
            reader.readAsDataURL(photoInput.files[0]);
        }

        syncProfileData();
        showSection('dating-section');
        loadNextCard();
    }

    // Обновление данных профиля во вкладке "Мой профиль"
    function syncProfileData() {
        document.getElementById('edit-name').value = currentUser.name;
        document.getElementById('edit-age').value = currentUser.age;
        document.getElementById('edit-bio').value = currentUser.bio;
        document.getElementById('my-avatar-display').src = currentUser.photo;
    }

    // Сохранение изменений в профиле
    function updateProfile() {
        currentUser.name = document.getElementById('edit-name').value;
        currentUser.age = document.getElementById('edit-age').value;
        currentUser.bio = document.getElementById('edit-bio').value;
        alert("Профиль обновлен!");
    }

    // Логика лайков
    function loadNextCard() {
        if (currentUserIndex >= mockUsers.length) {
            document.getElementById('user-card').innerHTML = "<h4>Люди закончились :(</h4>";
            return;
        }
        const user = mockUsers[currentUserIndex];
        document.getElementById('card-photo').src = user.photo;
        document.getElementById('card-name').innerText = `${user.name}, ${user.age}`;
        document.getElementById('card-bio').innerText = user.bio;
    }

    function nextUser() {
        currentUserIndex++;
        loadNextCard();
    }
</script>

</body>
</html>
